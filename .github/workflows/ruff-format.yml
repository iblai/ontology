name: Ruff Format, Lint, and Import Sort

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.py"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/ruff-action@v3
        with:
          version: 0.14.14
          args: format --diff

      - uses: astral-sh/ruff-action@v3
        with:
          version: 0.14.14
          args: check --diff --select I

      - name: Fetch base branch
        run: git fetch --no-tags --depth=1 origin ${{ github.base_ref }}

      - name: Get changed Python files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR FETCH_HEAD..HEAD -- '*.py' | xargs)
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "any_changed=$( [ -n "$FILES" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Ruff lint changed files
        if: steps.changed.outputs.any_changed == 'true'
        uses: astral-sh/ruff-action@v3
        with:
          version: 0.14.14
          src: ${{ steps.changed.outputs.files }}
          args: check
