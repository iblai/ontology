# ============================================================
# tools.yaml — sources, tools, and toolsets for iblai-ontology
# (Component 1: MCP connectivity layer)
#
# Multi-document YAML: kind: source | tool | toolset.
# `ontology mcp build` translates this into the Toolbox-native
# config/generated/toolbox.yaml that the mcp-toolbox container loads.
#
# NOTE: the Toolbox connects to EVERY source at startup and will not start if
# any is unreachable — keep only sources you have configured here. The PeopleSoft
# higher-ed sample lives in tools.higher-ed.example.yaml.
# ============================================================
# ============================================================
# SOURCE: Local iblai-ontology Cache (PostgreSQL)
# ============================================================
kind: source
name: ontology-cache
type: postgres
host: ontology-db
port: 5432
database: ontology
user: ${ONTOLOGY_DB_USER}
password: ${ONTOLOGY_DB_PASSWORD}
---
# ============================================================
# SOURCE: Generic remote PostgreSQL (any client DB)
# Connection is fully env-driven — point CLIENT_DB_* at any reachable
# Postgres. Use a read-only role (see docs/read-only-db-user.md).
# ============================================================
kind: source
name: client-postgres
type: postgres
host: ${CLIENT_DB_HOST}
port: ${CLIENT_DB_PORT}
database: ${CLIENT_DB_NAME}
user: ${CLIENT_DB_RO_USER}
password: ${CLIENT_DB_RO_PASSWORD}
---
# ============================================================
# TOOL: Query ontology structured cache
# ============================================================
kind: tool
name: query-ontology-cache
type: postgres-sql
source: ontology-cache
description: >
  Run a read-only SQL query against the local ontology cache.
  Contains materialized views of students, enrollment, courses,
  financial aid, holds, and facilities data.
parameters:
  - name: sql
    type: string
    description: A SELECT query against iblai-ontology cache tables
statement: ${sql}
---
# ============================================================
# TOOL: Search students in ontology cache
# ============================================================
kind: tool
name: search-students
type: postgres-sql
source: ontology-cache
description: >
  Search for students by name, major, classification, or status.
parameters:
  - name: search_term
    type: string
    description: Partial name, major code, or classification
statement: >
  SELECT
    id, full_name, email, classification,
    major_code, major_name, cumulative_gpa,
    enrollment_status, has_active_holds,
    last_synced_at
  FROM students
  WHERE full_name ILIKE '%' || $1 || '%'
     OR major_code ILIKE '%' || $1 || '%'
     OR classification ILIKE '%' || $1 || '%'
     OR id = $1
  ORDER BY full_name
  LIMIT 50
---
# ============================================================
# TOOL: Enrollment summary statistics
# ============================================================
kind: tool
name: enrollment-summary
type: postgres-sql
source: ontology-cache
description: >
  Get aggregate enrollment statistics for a term.
parameters:
  - name: term
    type: string
    description: Term code (e.g., "FALL2026")
statement: >
  SELECT
    e.term_code,
    COUNT(DISTINCT e.student_id) AS total_enrolled,
    COUNT(DISTINCT e.student_id) FILTER (WHERE s.classification = 'Freshman') AS freshmen,
    COUNT(DISTINCT e.student_id) FILTER (WHERE s.classification = 'Sophomore') AS sophomores,
    COUNT(DISTINCT e.student_id) FILTER (WHERE s.classification = 'Junior') AS juniors,
    COUNT(DISTINCT e.student_id) FILTER (WHERE s.classification = 'Senior') AS seniors,
    ROUND(AVG(s.cumulative_gpa), 2) AS avg_gpa,
    COUNT(DISTINCT e.student_id) FILTER (WHERE s.has_active_holds) AS students_with_holds,
    SUM(e.credits) AS total_credit_hours
  FROM enrollment e
  JOIN students s ON e.student_id = s.id
  WHERE e.term_code = $1
  GROUP BY e.term_code
---
# ============================================================
# TOOL: List tables in the client Postgres
# ============================================================
kind: tool
name: list-client-tables
type: postgres-sql
source: client-postgres
description: >
  List user tables in the client database with their schema and
  approximate row counts — useful for exploring an unfamiliar DB.
parameters:
  - name: schema
    type: string
    description: Schema name to list (e.g., "public")
statement: >
  SELECT
    schemaname AS schema,
    relname    AS table_name,
    n_live_tup AS approx_rows
  FROM pg_stat_user_tables
  WHERE schemaname = $1
  ORDER BY n_live_tup DESC
---
# ============================================================
# TOOL: Describe a table's columns in the client Postgres
# ============================================================
kind: tool
name: describe-client-table
type: postgres-sql
source: client-postgres
description: >
  List the columns, data types, and nullability of a table in the
  client database — for understanding an unfamiliar schema.
parameters:
  - name: schema
    type: string
    description: Schema name (e.g., "public")
  - name: table_name
    type: string
    description: Table name to describe
statement: >
  SELECT
    column_name,
    data_type,
    is_nullable,
    column_default
  FROM information_schema.columns
  WHERE table_schema = $1
    AND table_name = $2
  ORDER BY ordinal_position
---
kind: toolset
name: admin-analytics-tools
tools:
  - query-ontology-cache
  - enrollment-summary
  - search-students
---
kind: toolset
name: client-db-tools
tools:
  - list-client-tables
  - describe-client-table
