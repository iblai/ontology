# ──────────────────────────────────────────────────────────────────────────
# Ontology registry
#
# A single source of truth that grounds OpenClaw / NemoClaw sandboxes in
# persistent storage. Describe every filesystem once, then bind it to the
# sandboxes that may use it — read-only or read-write — by folder path.
#
# Validate with:   ontology -c config/ontology.example.yaml validate
# Plan a sandbox:  ontology -c config/ontology.example.yaml plan --sandbox openclaw-prod
# ──────────────────────────────────────────────────────────────────────────
version: "1"

# 1) The filesystems in the registry. Each is EFS or classic NFS.
filesystems:
  - id: shared-knowledge
    name: "Shared Knowledge Base"
    type: efs
    file_system_id: ${EFS_KNOWLEDGE_ID}      # e.g. fs-0123456789abcdef0
    region: us-east-1
    transit_encryption: true                 # mount with TLS via efs-utils
    root: /knowledge                          # folder inside the EFS to expose

  - id: student-vault
    name: "Student Vault"
    type: efs
    file_system_id: ${EFS_VAULT_ID}
    region: us-east-1
    access_point: ${EFS_VAULT_ACCESS_POINT}  # EFS access point pins root + POSIX user

  - id: scratch
    name: "Scratch / Working Set"
    type: nfs
    server: nfs.internal.ibl.ai
    export: /exports/scratch
    root: /                                   # whole export
    options:                                  # extra mount -o options, appended verbatim
      - rsize=1048576
      - wsize=1048576

# 2) Who can mount what, where, and how. Later rules override earlier ones on
#    the same mount_path, so a wildcard default can be tightened per sandbox.
permissions:
  # Every sandbox gets the knowledge base, read-only.
  - filesystem: shared-knowledge
    mount_path: /mnt/knowledge
    access: ro
    sandboxes: ["*"]

  # Only the named sandboxes can touch the student vault, read-write.
  - filesystem: student-vault
    mount_path: /mnt/vault
    access: rw
    sandboxes: ["openclaw-prod", "nemoclaw-research"]
    uid: 1000
    gid: 1000

  # Glob patterns work too — every research sandbox gets scratch space.
  - filesystem: scratch
    mount_path: /mnt/scratch
    access: rw
    sandboxes: ["*-research"]

# 3) The sandboxes themselves (optional metadata; ids may also be implicit).
sandboxes:
  - id: openclaw-prod
    runtime: openclaw
    description: "Production OpenClaw gateway"
  - id: nemoclaw-research
    runtime: nemoclaw
    description: "NVIDIA NemoClaw research instance"
