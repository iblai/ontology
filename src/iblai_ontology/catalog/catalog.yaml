# ============================================================
# Built-in service catalog — defaults for common systems across every ibl.ai
# solution segment (higher-ed, enterprise, k-12, government, legal,
# financial-services, medical-healthcare).
#
# Each entry seeds `ontology service add --from <key>` (and is the target of
# `ontology catalog show <key>`). API entries mirror the SKILL.md definitions in
# the per-segment iblai/<segment>-agents repos; the database entry (peoplesoft)
# comes from the architecture doc. Vendored skill files live in catalog/skills/.
# ============================================================
entries:
  peoplesoft:
    display_name: "PeopleSoft (Oracle)"
    type: database
    adapter: peoplesoft
    connection: {driver: oracle, default_port: 1521}
    env: [PEOPLESOFT_DB_HOST, PEOPLESOFT_DB_PORT, PEOPLESOFT_DB_NAME, PEOPLESOFT_RO_USER, PEOPLESOFT_RO_PASSWORD]
    default_toolset: enrollment-tools
    sync_defaults: {students: 1h, courses: 6h, financial_aid: 1h, demographics: 24h}
    summary: "Campus Solutions SIS on Oracle — students, enrollment, financial aid, courses, HR (PS_* tables, EMPLID keys)."

  banner:
    display_name: "Ellucian Banner (REST)"
